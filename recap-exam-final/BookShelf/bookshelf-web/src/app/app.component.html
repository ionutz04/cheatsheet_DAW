<div class="shell">
  <header class="topbar">
    <div class="brand">BookShelf</div>
    <nav class="nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/books" routerLinkActive="active">Books</a>
      @if (isAdmin()) {
        <a routerLink="/authors" routerLinkActive="active">Authors</a>
      }
      <a routerLink="/genres" routerLinkActive="active">Genres</a>
      @if (!isAuthenticated()) {
        <a routerLink="/login" routerLinkActive="active">Login</a>
      }
      @if (isAuthenticated()) {
        <button class="secondary" type="button" (click)="logout()">Logout</button>
      }
    </nav>
  </header>

  <main class="content">
    <router-outlet />
  </main>
</div>
