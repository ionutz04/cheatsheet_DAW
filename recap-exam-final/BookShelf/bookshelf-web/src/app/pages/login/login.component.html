<section class="card">
  <h1>Login</h1>
  <p class="muted">Apelează <code>/api/auth/login</code> și salvează JWT-ul în <code>localStorage</code>. Admin seed: <code>admin&#64;bookshelf.com</code> / <code>Admin&#64;123</code>.</p>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <label>
      <span>Email</span>
      <input type="email" formControlName="email" autocomplete="username" />
    </label>
    <label>
      <span>Parolă</span>
      <input type="password" formControlName="password" autocomplete="current-password" />
    </label>

    @if (error()) { <div class="error">{{ error() }}</div> }

    <div class="actions">
      <button type="submit" [disabled]="busy() || form.invalid">Sign in</button>
      <button type="button" class="secondary" (click)="register()" [disabled]="busy() || form.invalid">Register</button>
    </div>
  </form>
</section>
